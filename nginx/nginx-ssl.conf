events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Taille max upload (images, pièces jointes)
    client_max_body_size 20M;

    upstream backend     { server backend:8080; }
    upstream sav_front   { server sav-front-app:4000; }
    upstream sav_landing { server sav-landing-app:80; }
    upstream sav_admin   { server sav-admin-app:80; }

    # ──────────────────────────────────────────────────────
    # HTTP → HTTPS redirect + certbot challenge
    # ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name sama-sav.com www.sama-sav.com app.sama-sav.com admin.sama-sav.com api.sama-sav.com;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────
    # HTTPS — sama-sav.com → Landing page
    # ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name sama-sav.com www.sama-sav.com;

        ssl_certificate     /etc/letsencrypt/live/sama-sav.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sama-sav.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass         http://sav_landing/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ──────────────────────────────────────────────────────
    # HTTPS — app.sama-sav.com → sav-front (Angular SSR)
    # ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name app.sama-sav.com;

        ssl_certificate     /etc/letsencrypt/live/sama-sav.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sama-sav.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass         http://sav_front/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ──────────────────────────────────────────────────────
    # HTTPS — admin.sama-sav.com → sav-admin
    # ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.sama-sav.com;

        ssl_certificate     /etc/letsencrypt/live/sama-sav.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sama-sav.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass         http://sav_admin/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ──────────────────────────────────────────────────────
    # HTTPS — api.sama-sav.com → backend Spring Boot direct
    # ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.sama-sav.com;

        ssl_certificate     /etc/letsencrypt/live/sama-sav.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sama-sav.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
