spring.application.name=sav-back
server.port=8080

# DataSource PostgreSQL (dev local)
spring.datasource.url=jdbc:postgresql://localhost:5432/sav_db
spring.datasource.username=admin
spring.datasource.password=Azerty1221!

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=aac97a96bb2edaff5db5ab8cfa9b8aa20261e1f0321cb17cf69048a754eea9a9
jwt.expiration=28800000

# Springdoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# GZIP compression — réduit la taille des réponses JSON
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain
server.compression.min-response-size=1024

# HikariCP connection pool
spring.datasource.hikari.pool-name=SavHikariPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Feedback QR Code
app.frontend.url=http://localhost:4200
app.feedback.token-validity-days=30

# OTP Feedback
app.feedback.otp-validity-minutes=5
app.feedback.otp-max-attempts=3
app.feedback.otp-access-token-validity-minutes=15
# Mettre à true en dev pour afficher l'OTP dans les logs au lieu d'envoyer le SMS
app.feedback.otp-dev-mode=true

# Mail SMTP Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pamodiallo@gmail.com
spring.mail.password=lingfmramtcbvmho
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=pamodiallo@gmail.com
app.mail.enabled=true

