<div class="min-h-screen flex items-center justify-center bg-[#f8fafc] p-4 font-sans select-none overflow-hidden relative">
  <!-- Subtle background decoration -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl opacity-50"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-400/5 rounded-full blur-3xl opacity-50"></div>

  <app-card class="w-full max-w-[420px] shadow-2xl border-none bg-white/80 backdrop-blur-md rounded-2xl overflow-hidden animate-in fade-in zoom-in duration-500" [withHeaderTpl]="true">
    <div card-header class="text-center pt-8 pb-4">
      <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-white shadow-sm border border-gray-100 mb-6 group hover:scale-105 transition-transform duration-300">
        <img src="/assets/sav.png" alt="Sama SAV" class="h-16 w-auto object-contain" />
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 mb-1">Connexion</h1>
    </div>

    <div class="px-2 pt-2 transition-all duration-300">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <app-input
          formControlName="email"
          label="Identifiant ou Email"
          id="email"
          type="email"
          placeholder="votre@email.com"
          icon="lucideUser"
          errorMessage="Veuillez saisir un email valide."
        ></app-input>

        <div class="relative group">
          <app-input
            formControlName="password"
            label="Mot de passe"
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            icon="lucideLock"
            errorMessage="Le mot de passe est obligatoire."
          ></app-input>
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3 top-[34px] w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary hover:bg-primary/5 rounded-full transition-all duration-200 z-10"
            tabindex="-1"
            title="Afficher/Masquer le mot de passe"
          >
            <ng-icon [name]="showPassword() ? 'lucideEyeOff' : 'lucideEye'" class="w-4 h-4"></ng-icon>
          </button>
        </div>

        <div class="flex items-center justify-between py-1">
          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary/20 cursor-pointer" />
            <label for="remember" class="text-sm text-slate-600 cursor-pointer select-none">Se souvenir de moi</label>
          </div>
          <a href="javascript:void(0)" class="text-xs font-semibold text-primary hover:underline transition-all">Mot de passe oublié ?</a>
        </div>

        @if (error()) {
          <div class="p-3.5 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 animate-in fade-in slide-in-from-top-2">
            <div class="flex-shrink-0 w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm">
              <ng-icon name="lucideAlertCircle" class="text-red-500 w-5 h-5"></ng-icon>
            </div>
            <p class="text-sm font-semibold text-red-600">{{ error() }}</p>
          </div>
        }

        <div class="pt-2">
          <app-button
            type="submit"
            class="w-full h-12 text-[15px] font-bold shadow-lg shadow-primary/20 rounded-xl hover:translate-y-[-1px] active:translate-y-[1px] transition-all duration-200"
            [loading]="loading()"
            [disabled]="form.invalid || loading()"
          >
            {{ loading() ? 'Authentification...' : 'Se connecter' }}
          </app-button>
        </div>
      </form>
    </div>

    <div class="mt-8 text-center pb-6 border-t border-slate-100 pt-6">
      <p class="text-sm text-slate-500 font-medium">
        Besoin d'assistance ? <span class="text-primary font-bold cursor-pointer hover:underline">Contactez le support</span>
      </p>
    </div>
  </app-card>
</div>
