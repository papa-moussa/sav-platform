<ion-content>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="logo-placeholder">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <h1 class="text-gradient">SAV Connect</h1>
        <p class="subtitle">Espace Technicien</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <div class="input-group">
          <label for="email">Email professionnel</label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              id="email"
              type="email"
              formControlName="email"
              placeholder="votre.nom@sav.com"
              [clearInput]="true"
            ></ion-input>
          </ion-item>
        </div>

        <div class="input-group">
          <label for="password">Mot de passe</label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
            ></ion-input>
          </ion-item>
        </div>

        @if (error()) {
          <div class="error-message">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ error() }}</span>
          </div>
        }

        <ion-button
          expand="block"
          type="submit"
          [disabled]="form.invalid || loading()"
          class="submit-button"
        >
          @if (loading()) {
            <ion-spinner name="crescent" />
          } @else {
            <span>Se connecter</span>
            <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
          }
        </ion-button>
      </form>
      
      <div class="footer-links">
        <p>Mot de passe oublié ? <a>Contactez le support</a></p>
      </div>
    </div>
  </div>
</ion-content>

<style>
  :host {
    --login-bg: var(--ion-background-color);
  }

  .login-wrapper {
    min-height: 100%;
    background: var(--login-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--ion-item-background);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: var(--card-shadow);
    border: 1px solid var(--ion-color-step-100);
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-placeholder {
    width: 64px;
    height: 64px;
    background: var(--ion-color-primary);
    color: white;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
  }

  .brand h1 {
    font-size: 2.25rem;
    font-weight: 800;
    margin: 0 0 8px;
    letter-spacing: -0.05em;
  }

  .subtitle {
    color: var(--ion-color-step-500);
    font-size: 1rem;
    margin: 0;
    font-weight: 500;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--ion-color-step-700);
    padding-left: 4px;
  }

  .custom-input {
    --background: var(--ion-color-step-50);
    --border-radius: 12px;
    --padding-start: 12px;
    border: 1px solid var(--ion-color-step-200);
    transition: var(--transition-smooth);
  }

  .custom-input.item-has-focus {
    border-color: var(--ion-color-primary);
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
  }

  .custom-input ion-icon {
    color: var(--ion-color-step-400);
    margin-right: 12px;
  }

  .error-message {
    background: rgba(var(--ion-color-danger-rgb), 0.1);
    color: var(--ion-color-danger);
    padding: 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }

  .submit-button {
    margin-top: 8px;
    --height: 56px;
    font-size: 1rem;
    --box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
  }

  .footer-links {
    margin-top: 32px;
    text-align: center;
    font-size: 0.875rem;
    color: var(--ion-color-step-500);
  }

  .footer-links a {
    color: var(--ion-color-primary);
    font-weight: 600;
    text-decoration: none;
  }
</style>
